    tech: "https://wa.link/knk1e6"
    sales: "https://wa.link/blzjfv"
  prompt_file: "app/core/prompts/routes/tpms.md"
  heuristics:
    # Used only for cheap keyword routing (fast path).
    # All strings should be lowercase-friendly; code normalizes anyway.
    mentions:
      - "tpms"
      - "sensor tpms"
      - "sensores tpms"
      - "sensor"
      - "sensores"
